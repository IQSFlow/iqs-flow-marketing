# GCP Cloud Build - IQS Flow Marketing (static site)
# Tag trigger: ^v.*  ->  rsync site/ to gs://iqsflow-marketing-static/
#
# No container. No npm install. Just a file sync + CDN cache invalidation.

substitutions:
  _BUCKET: iqsflow-marketing-static
  _BACKEND_BUCKET: iqsflow-marketing-backend
  _URL_MAP: iqs-flow-urlmap

steps:
  # 1. Upload the site (add/update new files, delete files no longer present)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: rsync
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        echo "==> Syncing site/ -> gs://${_BUCKET}/"
        gsutil -m rsync -d -r -c site/ gs://${_BUCKET}/
        echo "==> Sync complete"

  # 2. Set long cache lifetimes on static assets (CSS/JS/images get 1y; HTML gets 5m)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: cache-headers
    entrypoint: bash
    waitFor: ["rsync"]
    args:
      - "-c"
      - |
        set -euo pipefail
        echo "==> Setting cache-control headers"
        # Immutable assets: CSS, JS, images, fonts - 1 year browser cache
        gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
          "gs://${_BUCKET}/**/*.css" \
          "gs://${_BUCKET}/**/*.js" \
          "gs://${_BUCKET}/**/*.png" \
          "gs://${_BUCKET}/**/*.jpg" \
          "gs://${_BUCKET}/**/*.jpeg" \
          "gs://${_BUCKET}/**/*.svg" \
          "gs://${_BUCKET}/**/*.woff" \
          "gs://${_BUCKET}/**/*.woff2" 2>/dev/null || true
        # HTML: 5 minutes so edits propagate fast without a manual invalidate
        gsutil -m setmeta -h "Cache-Control:public, max-age=300, must-revalidate" \
          "gs://${_BUCKET}/**/*.html" 2>/dev/null || true
        echo "==> Cache headers set"

  # 3. Invalidate the CDN edge cache for HTML pages so the latest copy serves NOW
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: invalidate
    entrypoint: bash
    waitFor: ["cache-headers"]
    args:
      - "-c"
      - |
        set -euo pipefail
        echo "==> Invalidating CDN cache on ${_URL_MAP}"
        gcloud compute url-maps invalidate-cdn-cache ${_URL_MAP} \
          --path "/*" \
          --async \
          --quiet || echo "    (invalidate non-fatal; cache will expire via TTL)"
        echo "==> Done"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: "600s"
